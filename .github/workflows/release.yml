name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build:ci

      - name: Create release artifacts
        run: |
          NAME="werewolf-vanillapack-${{ github.ref_name }}"
          cd BP && zip -r "../${NAME}-BP.zip" . && cd ..
          cd RP && zip -r "../${NAME}-RP.zip" . && cd ..
          zip "${NAME}.zip" "${NAME}-BP.zip" "${NAME}-RP.zip"
          cp "${NAME}-BP.zip" "${NAME}-BP.mcpack"
          cp "${NAME}-RP.zip" "${NAME}-RP.mcpack"
          zip "${NAME}.mcaddon" "${NAME}-BP.mcpack" "${NAME}-RP.mcpack"

      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            werewolf-vanillapack-${{ github.ref_name }}.mcaddon
            werewolf-vanillapack-${{ github.ref_name }}.zip
